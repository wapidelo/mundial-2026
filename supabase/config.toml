# Supabase Config — Mundial 2026
# https://supabase.com/docs/guides/cli/config

project_id = "hphpqynmebjftoyulwrr"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[auth]
enabled = true
site_url = "https://mundial-2026-beta.vercel.app"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "http://localhost:3001/auth/callback",
  "http://localhost:3002/auth/callback",
  "http://localhost:3003/auth/callback",
  "http://localhost:3000",
  "http://localhost:3001",
  "http://localhost:3002",
  "http://localhost:3003",
  "https://mundial-2026-beta.vercel.app/auth/callback",
  "https://mundial-2026-beta.vercel.app",
  "https://mundial-2026-wapidelos-projects.vercel.app/auth/callback",
  "https://mundial-2026-wapidelos-projects.vercel.app",
  "https://*.vercel.app/auth/callback",
  "https://*.vercel.app"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
otp_length = 6
otp_expiry = 3600
max_frequency = "1s"

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[edge_runtime]
enabled = true

[analytics]
enabled = false
